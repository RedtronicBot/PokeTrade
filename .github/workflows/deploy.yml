deploy:
  runs-on: ubuntu-latest
  needs: build-and-push

  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Étape 1 : On envoie le fichier docker-compose.yml sur le serveur
    - name: Copy docker-compose to server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "docker-compose.yml"
        target: "~/apps/mon-projet"

    # Étape 2 : On lance les commandes Docker
    - name: Executing remote ssh commands
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd ~/apps/mon-projet
          # On force le nom en minuscules pour Docker (à adapter si besoin)
          sed -i 's|${GITHUB_REPOSITORY}|redtronicbot/poketrade|g' docker-compose.yml
          docker compose pull
          docker compose up -d
