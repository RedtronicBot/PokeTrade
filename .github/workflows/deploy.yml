name: CI/CD Pipeline

on:
  push:
    branches: [main] # Se déclenche quand tu pushes sur main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare Repo Names in Lowercase
        id: repo_names
        run: |
          echo "backend_tag=ghcr.io/${GITHUB_REPOSITORY,,}/backend:latest" >> $GITHUB_OUTPUT
          echo "frontend_tag=ghcr.io/${GITHUB_REPOSITORY,,}/frontend:latest" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          # On utilise le tag généré à l'étape précédente
          tags: ${{ steps.repo_names.outputs.backend_tag }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          # On utilise le tag généré à l'étape précédente
          tags: ${{ steps.repo_names.outputs.frontend_tag }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Étape 1 : On envoie le fichier docker-compose.yml sur le serveur
      - name: Copy docker-compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "~/apps/mon-projet"

      # Étape 2 : On lance les commandes Docker
      - name: Executing remote ssh commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/apps/mon-projet
            # On demande à Docker de récupérer les nouvelles images
            docker compose pull
            # On relance les conteneurs proprement
            docker compose up -d
