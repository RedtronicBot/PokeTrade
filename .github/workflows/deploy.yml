name: CI/CD Pipeline

on:
  push:
    branches: [main] # Se déclenche quand tu pushes sur main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare Repo Names in Lowercase
        id: repo_names
        run: |
          echo "backend_tag=ghcr.io/${GITHUB_REPOSITORY,,}/backend:latest" >> $GITHUB_OUTPUT
          echo "frontend_tag=ghcr.io/${GITHUB_REPOSITORY,,}/frontend:latest" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          # On utilise le tag généré à l'étape précédente
          tags: ${{ steps.repo_names.outputs.backend_tag }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          # On utilise le tag généré à l'étape précédente
          tags: ${{ steps.repo_names.outputs.frontend_tag }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push # Attend que les images soient prêtes

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/apps/mon-projet
            cd ~/apps/mon-projet
            # On récupère le docker-compose du dépôt
            curl -o docker-compose.yml https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.yml
            # On remplace la variable GITHUB_REPOSITORY par ta valeur réelle
            sed -i 's/${GITHUB_REPOSITORY}/${{ github.repository }}/g' docker-compose.yml
            # On met à jour et on relance
            docker compose pull
            docker compose up -d
