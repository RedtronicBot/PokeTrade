services:
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY}/backend:latest
    networks:
      - proxy
    # Pas de ports ici, Traefik s'en occupe
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-redtro.rule=Host(`api.redtroverv.duckdns.org`)"
      - "traefik.http.routers.api-redtro.tls.certresolver=le"

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}/frontend:latest
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.front-redtro.rule=Host(`www.redtroverv.duckdns.org`)"
      - "traefik.http.routers.front-redtro.tls.certresolver=le"

networks:
  proxy:
    external: true
